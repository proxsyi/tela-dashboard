<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tela Hub Dashboard</title>
  <link rel="stylesheet" href="style.css" />
  <noscript>
    <style>
      #app { display: none; }
      .noscript-msg { display: block !important; }
    </style>
  </noscript>
</head>
<body>
  <div class="noscript-msg" style="display:none; padding:2rem; color:#ccc; font-family:sans-serif;">
    JavaScript is required to render the Tela Dashboard.
  </div>

  <div id="app">
    <div id="loading" class="loading-state">
      <div class="loading-spinner"></div>
      <p>Loading Tela Hub&hellip;</p>
    </div>

    <div id="dashboard" class="dashboard hidden">

      <header class="dash-header">
        <div class="dash-header-inner">
          <div class="dash-title-group">
            <span class="dash-logo">&#9670;</span>
            <h1 id="dash-name" class="dash-name">Tela Hub</h1>
          </div>
          <div class="dash-meta">
            <span id="dash-source-pill" class="source-pill"></span>
            <span id="dash-last-updated" class="last-updated"></span>
          </div>
        </div>
      </header>

      <main class="dash-main">

        <section class="hero-section">
          <div class="hero-status-row">
            <span id="hero-status" class="hero-status"></span>
          </div>
          <div class="hero-autonomy-row">
            <span id="hero-autonomy" class="hero-autonomy"></span>
          </div>
          <div class="progress-row">
            <div class="progress-track">
              <div id="progress-bar" class="progress-bar" style="width:0%"></div>
            </div>
            <span id="progress-label" class="progress-label">0%</span>
          </div>
        </section>

        <section id="cards-section" class="cards-section">
          <div id="cards-grid" class="cards-grid"></div>
        </section>

        <section id="current-task-section" class="panel-section">
          <h2 class="section-heading">Current Task</h2>
          <p id="current-task-body" class="current-task-body"></p>
        </section>

        <section id="needs-cash-section" class="panel-section hidden">
          <h2 class="section-heading">Needs Cash</h2>
          <div id="needs-cash-list" class="needs-list"></div>
        </section>

        <section id="sections-area" class="sections-area"></section>

        <section class="panel-section repo-section">
          <h2 class="section-heading">Repo &amp; Pages</h2>
          <div id="repo-info" class="repo-info"></div>
        </section>

      </main>

      <footer class="dash-footer">
        <span>Tela Hub Dashboard &mdash; static GitHub Pages</span>
      </footer>

    </div>
  </div>

  <script src="notion-source.js" defer></script>
  <script src="loader.js" defer></script>
</body>
</html>
